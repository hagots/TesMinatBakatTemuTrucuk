<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - RIASEC</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #2c3e50;
      border-bottom: 3px solid #e74c3c;
      padding-bottom: 12px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .login-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 30px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #c0392b;
    }
    .logout-btn {
      float: right;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    .refresh-btn {
      float: right;
      background: #2ecc71;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
    }
    .download-btn {
      float: right;
      background: #f39c12;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
    }
    .download-btn:hover {
      background: #e67e22;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 20px;
    }
    th {
      background: #2c3e50;
      color: white;
      padding: 10px 6px;
      text-align: left;
      white-space: nowrap;
    }
    td {
      padding: 8px 6px;
      border-bottom: 1px solid #ecf0f1;
    }
    tr:hover {
      background: #f1f9ff;
    }
    .badge {
      display: inline-block;
      background: #3498db;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-weight: bold;
    }
    .btn-hapus {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-hapus:hover {
      background: #c0392b;
    }
    .btn-hapus:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
      font-size: 18px;
    }
    .error {
      color: #e74c3c;
      text-align: center;
      padding: 20px;
    }
    @media (max-width: 700px) {
      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }
      thead tr {
        display: none;
      }
      tr {
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
      }
      td {
        border: none;
        padding: 6px 10px;
      }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        display: inline-block;
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">⬅ Kembali ke Halaman Tes</a>

    <!-- LOGIN ADMIN -->
    <div id="loginSection">
      <div class="login-box">
        <h2 style="text-align:center; margin-top:0;">🔐 Login Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email Admin" value="admin@riasec.com" />
        <input type="password" id="adminPassword" placeholder="Password" />
        <button id="loginBtn">Masuk</button>
        <div id="loginError" style="color:red; text-align:center; margin-top:10px;"></div>
      </div>
    </div>

    <!-- DATA PESERTA -->
    <div id="dataSection" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
        <h1>👤 Panel Admin — Data Peserta</h1>
        <div>
          <button class="download-btn" id="downloadBtn">📥 Download Excel</button>
          <button class="refresh-btn" id="refreshBtn">↻ Muat Ulang</button>
          <button class="logout-btn" id="logoutBtn">🚪 Keluar</button>
        </div>
      </div>
      <div id="adminStatus" style="color:green; margin-bottom:10px;">✅ Login sebagai Admin</div>
      <div id="loadingMessage" class="loading">⏳ Memuat data...</div>
      <div id="tableWrapper" style="display:none;">
        <div style="overflow-x:auto;">
          <table id="dataTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Pendidikan</th>
                <th>Umur</th>
                <th>R</th>
                <th>I</th>
                <th>A</th>
                <th>S</th>
                <th>E</th>
                <th>C</th>
                <th>Mulai</th>
                <th>Durasi</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="totalCount" style="margin-top:15px; color:#7f8c8d;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // ============================================================
    // 1. IMPOR FIREBASE SDK
    // ============================================================
    import { initializeApp } from 'firebase/app';
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from 'firebase/auth';
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      getDocs,
      deleteDoc,
      doc
    } from 'firebase/firestore';

    // ============================================================
    // 2. KONFIGURASI FIREBASE
    // ============================================================
    const firebaseConfig = {
      apiKey: 'AIzaSyCU-KgCUo-ma5chOEVpnZ2ycpVWC2spIg8',
      authDomain: 'tes-riasec-rana.firebaseapp.com',
      projectId: 'tes-riasec-rana',
      storageBucket: 'tes-riasec-rana.firebasestorage.app',
      messagingSenderId: '940488035527',
      appId: '1:940488035527:web:2157e4235363cc4f4802e2'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = 'admin@riasec.com';

    // ============================================================
    // 3. ELEMEN DOM
    // ============================================================
    const loginSection = document.getElementById('loginSection');
    const dataSection = document.getElementById('dataSection');
    const loginError = document.getElementById('loginError');
    const loadingMsg = document.getElementById('loadingMessage');
    const tableWrapper = document.getElementById('tableWrapper');
    const tableBody = document.getElementById('tableBody');
    const totalCount = document.getElementById('totalCount');

    // ============================================================
    // 4. CEK STATUS LOGIN
    // ============================================================
    onAuthStateChanged(auth, async (user) => {
      if (user && user.email === ADMIN_EMAIL) {
        loginSection.style.display = 'none';
        dataSection.style.display = 'block';
        loadData();
      } else if (user) {
        loginSection.style.display = 'block';
        dataSection.style.display = 'none';
        loginError.innerText = '⚠️ Akun ini bukan admin. Silakan login dengan akun admin.';
        await signOut(auth);
      } else {
        loginSection.style.display = 'block';
        dataSection.style.display = 'none';
        loginError.innerText = '';
      }
    });

    // ============================================================
    // 5. LOGIN
    // ============================================================
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      loginError.innerText = '⏳ Memproses...';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        if (cred.user.email !== ADMIN_EMAIL) {
          await signOut(auth);
          loginError.innerText = '❌ Email ini bukan admin terdaftar.';
        } else {
          loginError.innerText = '';
        }
      } catch (error) {
        loginError.innerText = '❌ Gagal login: ' + error.message;
      }
    });

    // ============================================================
    // 6. LOGOUT
    // ============================================================
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      loginSection.style.display = 'block';
      dataSection.style.display = 'none';
      loginError.innerText = '';
    });

    // ============================================================
    // 7. LOAD DATA
    // ============================================================
    async function loadData() {
      loadingMsg.style.display = 'block';
      tableWrapper.style.display = 'none';

      try {
        const q = query(
          collection(db, 'riasec_results'),
          orderBy('timestamp', 'desc')
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          loadingMsg.innerHTML = '📭 Belum ada data peserta.';
          tableWrapper.style.display = 'none';
          return;
        }

        let html = '';
        let count = 0;
        snapshot.forEach(docSnap => {
          count++;
          const data = docSnap.data();
          const docId = docSnap.id;
          const scores = data.scores || {};

          // Format waktu mulai
          let startDisplay = '-';
          if (data.startTime) {
            try {
              const d = new Date(data.startTime);
              startDisplay = d.toLocaleString('id-ID', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
              });
            } catch { startDisplay = data.startTime; }
          }

          // Format durasi (detik → menit:detik)
          let durationDisplay = '-';
          if (data.durationSeconds !== undefined && data.durationSeconds !== null) {
            const totalDetik = data.durationSeconds;
            const menit = Math.floor(totalDetik / 60);
            const detik = totalDetik % 60;
            durationDisplay = `${menit}m ${detik}d`;
          }

          const waktu = data.timestamp?.toDate?.()
            ? data.timestamp.toDate().toLocaleString('id-ID')
            : 'Tidak diketahui';

          html += `
            <tr data-id="${docId}">
              <td data-label="#">${count}</td>
              <td data-label="Nama"><strong>${escapeHtml(data.nama || '-')}</strong></td>
              <td data-label="Pendidikan">${escapeHtml(data.pendidikan || '-')}</td>
              <td data-label="Umur">${data.umur || '-'}</td>
              <td data-label="R"><span class="badge">${scores.R ?? 0}</span></td>
              <td data-label="I"><span class="badge">${scores.I ?? 0}</span></td>
              <td data-label="A"><span class="badge">${scores.A ?? 0}</span></td>
              <td data-label="S"><span class="badge">${scores.S ?? 0}</span></td>
              <td data-label="E"><span class="badge">${scores.E ?? 0}</span></td>
              <td data-label="C"><span class="badge">${scores.C ?? 0}</span></td>
              <td data-label="Mulai">${startDisplay}</td>
              <td data-label="Durasi">${durationDisplay}</td>
              <td data-label="Aksi">
                <button class="btn-hapus" data-id="${docId}">🗑️ Hapus</button>
              </td>
            </tr>
          `;
        });

        tableBody.innerHTML = html;
        totalCount.textContent = `Total peserta: ${count} orang.`;
        loadingMsg.style.display = 'none';
        tableWrapper.style.display = 'block';

        document.querySelectorAll('.btn-hapus').forEach(btn => {
          btn.addEventListener('click', handleDelete);
        });

      } catch (error) {
        console.error('Gagal ambil data:', error);
        loadingMsg.innerHTML =
          '❌ Gagal memuat data. Pastikan Anda login sebagai admin dan aturan keamanan sudah benar.<br>' +
          error.message;
        tableWrapper.style.display = 'none';
      }
    }

    // ============================================================
    // 8. HAPUS DATA
    // ============================================================
    async function handleDelete(e) {
      const btn = e.currentTarget;
      const docId = btn.getAttribute('data-id');
      if (!docId) return;

      if (!confirm('Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.')) {
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳';

      try {
        const docRef = doc(db, 'riasec_results', docId);
        await deleteDoc(docRef);
        const row = btn.closest('tr');
        if (row) {
          row.remove();
          updateRowNumbersAndCount();
        }
        alert('Data berhasil dihapus!');
      } catch (error) {
        console.error('Gagal hapus:', error);
        alert('Gagal menghapus data: ' + error.message);
        btn.disabled = false;
        btn.textContent = '🗑️ Hapus';
      }
    }

    function updateRowNumbersAndCount() {
      const rows = tableBody.querySelectorAll('tr');
      rows.forEach((row, index) => {
        const td = row.querySelector('td[data-label="#"]');
        if (td) td.textContent = index + 1;
      });
      totalCount.textContent = `Total peserta: ${rows.length} orang.`;
      if (rows.length === 0) {
        tableWrapper.style.display = 'none';
        loadingMsg.innerHTML = '📭 Semua data telah dihapus.';
        loadingMsg.style.display = 'block';
      }
    }

    // ============================================================
    // 9. EXPORT CSV
    // ============================================================
    document.getElementById('downloadBtn').addEventListener('click', async function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';

      try {
        const q = query(
          collection(db, 'riasec_results'),
          orderBy('timestamp', 'desc')
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          alert('Tidak ada data untuk diekspor.');
          btn.disabled = false;
          btn.textContent = '📥 Download Excel';
          return;
        }

        const headers = [
          'No', 'Nama', 'Pendidikan', 'Umur',
          'R', 'I', 'A', 'S', 'E', 'C',
          'Mulai', 'Durasi (detik)', 'Waktu Selesai'
        ];

        const rows = [];
        let count = 0;
        snapshot.forEach(docSnap => {
          count++;
          const data = docSnap.data();
          const scores = data.scores || {};

          let startDisplay = '';
          if (data.startTime) {
            try {
              const d = new Date(data.startTime);
              startDisplay = d.toLocaleString('id-ID');
            } catch { startDisplay = data.startTime; }
          }

          let durationDisplay = '';
          if (data.durationSeconds !== undefined && data.durationSeconds !== null) {
            durationDisplay = data.durationSeconds;
          }

          let endDisplay = '';
          if (data.endTime) {
            try {
              const d = new Date(data.endTime);
              endDisplay = d.toLocaleString('id-ID');
            } catch { endDisplay = data.endTime; }
          }

          rows.push([
            count,
            data.nama || '-',
            data.pendidikan || '-',
            data.umur || '-',
            scores.R ?? 0,
            scores.I ?? 0,
            scores.A ?? 0,
            scores.S ?? 0,
            scores.E ?? 0,
            scores.C ?? 0,
            startDisplay,
            durationDisplay,
            endDisplay
          ]);
        });

        let csvContent = headers.join(',') + '\n';
        rows.forEach(row => {
          const escapedRow = row.map(cell => {
            if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"') || cell.includes('\n'))) {
              return `"${cell.replace(/"/g, '""')}"`;
            }
            return cell;
          });
          csvContent += escapedRow.join(',') + '\n';
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `riasec_data_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

      } catch (error) {
        console.error('Gagal ekspor:', error);
        alert('Gagal mengekspor data: ' + error.message);
      }

      btn.disabled = false;
      btn.textContent = '📥 Download Excel';
    });

    // ============================================================
    // 10. UTILITY
    // ============================================================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);
  </script>
</body>
</html>
